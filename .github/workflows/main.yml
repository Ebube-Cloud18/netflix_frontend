name: Build and push docker image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v2


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

# Login to ECR
#=============
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2


    - name: Docker build 
      run: |
        echo "${{ vars.AXIOSCONFIG_JS }}" > axiosConfig.js
        # ls -la 
        # cat axiosConfig.js
        docker build -t netflix_frontend:latest .

    - name: Docker push
      run: |
        docker tag netflix_frontend:latest 586284112102.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:${GITHUB_RUN_NUMBER}
        docker push 586284112102.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:${GITHUB_RUN_NUMBER}
